<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Explosivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            overflow: hidden;
            color: white;
        }

        /* Canvas para as partículas */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Container de Login */
        .login-card {
            position: relative;
            z-index: 10;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
            animation: intro 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes intro {
            from { transform: scale(0) rotate(20deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        h2 {
            margin-bottom: 25px;
            font-size: 24px;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .input-box {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-box label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #888;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        #login-btn {
            width: 100%;
            padding: 15px;
            background: #ff4d4d;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s, background 0.3s;
            position: relative;
            overflow: hidden;
        }

        #login-btn:active {
            transform: scale(0.95);
        }

        #login-btn:hover {
            background: #ff3333;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="login-card" id="card">
        <h2>Acesso</h2>
        <div class="input-box">
            <label>USUÁRIO</label>
            <input type="text" placeholder="Digite seu user">
        </div>
        <div class="input-box">
            <label>SENHA</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button id="login-btn">DETONAR LOGIN</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('login-btn');
        const card = document.getElementById('card');

        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 2;
                this.speedX = Math.random() * 20 - 10;
                this.speedY = Math.random() * 20 - 10;
                this.color = `hsl(${Math.random() * 30 + 0}, 100%, 50%)`; // Cores de fogo/explosão
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                if (this.size > 0.2) this.size -= 0.1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

        btn.addEventListener('click', (e) => {
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            // Efeito visual de explosão
            createExplosion(x, y);
            
            // Shake no card
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);

            // Simulação de login
            btn.innerText = "BOOM!";
            setTimeout(() => {
                btn.innerText = "DETONAR LOGIN";
            }, 1000);
        });
    </script>
</body>
</html>
